<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relojes de Lujo, Santiago de Chile</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>✨ Relojes de Lujo, Santiago de Chile ✨</h1>
            <p class="subtitle">Timepieces & Jewelry of Distinction</p>
        </div>
    </header>

    <main class="container">
        <div class="search-filter-section">
            <div class="search-container">
                <input type="text" 
                       id="searchBox" 
                       class="search-box" 
                       placeholder="🔍 Buscar relojes y joyas de lujo...">
            </div>
            <div class="filter-buttons" id="filterButtons">
                <!-- Categories will be loaded dynamically -->
            </div>
        </div>

        <div class="products-grid" id="productsGrid">
            <!-- Products will be loaded dynamically -->
            <div class="loading">Cargando productos...</div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Relojes de Lujo, Santiago de Chile</p>
            <p>Calidad excepcional • Diseño exclusivo • Elegancia atemporal</p>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
